<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>北京編譯中心稿件統計工具 - 登錄</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="page-login">
  <header class="app-header">
    <div class="logo">北京編譯中心稿件統計工具</div>
  </header>

  <main class="app-main">
    <section class="card login-card">
      <h1 class="card-title">選擇姓名登錄</h1>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% else %}
        <p class="help-text">本工具僅供北京編譯中心內部使用，無需密碼，請從名單中選擇您的姓名。</p>
      {% endif %}
      <form method="post" class="form-vertical">
        <label for="member_name">姓名</label>
        <select id="member_name" name="member_name" required>
          <option value="">請選擇</option>
          {% for m in members %}
            <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary">進入系統</button>
      </form>
    </section>
  </main>

  <footer class="app-footer">
    <span>內部工具 · 數據公開透明 · 僅供北京編譯中心使用</span>
  </footer>
</body>
</html>
